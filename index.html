<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Paddock Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <header class="app-header slide-down">
    <div class="brand">
      <span class="brand-kicker">SPORTS DATA ECOSYSTEM</span>
      <h1>The Paddock Dashboard</h1>
    </div>
    <div class="module-tabs" role="tablist" aria-label="Sports Modules">
      <button class="tab-btn active" data-module="f1" role="tab" aria-selected="true">Formula 1</button>
      <button class="tab-btn" data-module="football" role="tab" aria-selected="false">Football</button>
      <button class="tab-btn" data-module="cricket" role="tab" aria-selected="false">Cricket</button>
      <button class="tab-btn" data-module="nba" role="tab" aria-selected="false">NBA</button>
    </div>
  </header>

  <main class="dashboard-shell fade-in">
    <section class="hero glass-card">
      <div>
        <p class="kicker" id="moduleTag">F1 COMMAND CENTER</p>
        <h2 id="moduleHeadline">Live telemetry-inspired race intelligence</h2>
      </div>
      <div class="hero-right">
        <span id="favoriteLabel">Favorite Driver: None</span>
        <button id="resetPrefsBtn" class="ghost-btn">Reset Preferences</button>
      </div>
    </section>

    <section id="dashboardGrid" class="dashboard-grid" aria-live="polite"></section>
  </main>

  <template id="statCardTemplate">
    <article class="glass-card stat-card card-entry">
      <p class="stat-title"></p>
      <p class="stat-value"></p>
      <p class="stat-subtitle"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
