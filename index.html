<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f17" />
  <title>Sports Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
</head>
<body>
  <div class="bg-lights" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="app-header slide-down">
    <div class="brand brand-lockup">
      <img class="brand-logo" src="assets/logo-mark.svg" alt="Sports Dashboard logo" width="64" height="64" />
      <div class="brand-copy">
        <span class="brand-kicker">LIVE PERFORMANCE CENTER</span>
        <h1>Sports Dashboard</h1>
        <p class="brand-note">Real-time multi-sport intelligence, designed like a broadcast product.</p>
      </div>
    </div>
    <div class="header-nav-right">
      <div class="module-tabs" role="tablist" aria-label="Sports Modules">
        <button class="tab-btn active" data-module="f1" role="tab" aria-selected="true">Formula 1</button>
        <button class="tab-btn" data-module="football" role="tab" aria-selected="false">Football</button>
        <button class="tab-btn" data-module="cricket" role="tab" aria-selected="false">Cricket</button>
        <button class="tab-btn" data-module="nba" role="tab" aria-selected="false">NBA</button>
      </div>
      <div class="header-tools">
        <input id="globalSearchInput" class="select-input top-search" placeholder="Search drivers, teams, GP history" />
        <select id="timezoneSelect" class="select-input timezone-select" aria-label="Timezone selector">
          <option value="Asia/Kolkata" selected>Mumbai (IST)</option>
          <option value="TRACK_AUTO">Track Local (Auto)</option>
          <option value="UTC">UTC</option>
          <option value="Europe/London">London (BST/GMT)</option>
          <option value="America/New_York">New York (ET)</option>
          <option value="Asia/Tokyo">Tokyo (JST)</option>
        </select>
        <button id="openSettingsBtn" class="small-btn" type="button">Settings</button>
        <button class="profile-chip" type="button" aria-label="User profile">
          <span class="profile-dot">SS</span>
          <span>My Sports</span>
        </button>
      </div>
    </div>
  </header>

  <main class="dashboard-shell fade-in">
    <section id="dashboardGrid" class="dashboard-grid" aria-live="polite"></section>
  </main>

  <aside id="settingsDrawer" class="settings-drawer hidden" aria-label="Sports settings">
    <div class="settings-panel glass-card">
      <div class="settings-head">
        <h3 class="card-title">Settings</h3>
        <button id="closeSettingsBtn" class="small-btn" type="button">Close</button>
      </div>
      <div class="pref-group">
        <label>Mobile Feedback</label>
        <button id="fxToggleBtn" class="ghost-btn" type="button">FX ON</button>
      </div>
      <div class="pref-group">
        <label for="favoriteTeamSelect">Favorite Team</label>
        <select id="favoriteTeamSelect" class="select-input pref-select">
          <option value="">Select team</option>
        </select>
      </div>
      <div class="pref-group">
        <label for="favoriteDriverSelect">Favorite Driver</label>
        <select id="favoriteDriverSelect" class="select-input pref-select">
          <option value="">Select driver</option>
        </select>
      </div>
      <p id="favoriteLabel" class="settings-note">No favorites selected</p>
      <button id="resetPrefsBtn" class="ghost-btn" type="button">Reset Preferences</button>
    </div>
  </aside>

  <template id="statCardTemplate">
    <article class="glass-card stat-card card-entry">
      <p class="stat-title"></p>
      <p class="stat-value"></p>
      <p class="stat-subtitle"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
